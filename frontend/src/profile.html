<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Perfil — LuxAuto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/layout.css" />
  <link rel="stylesheet" href="./styles/components.css" />
  <link rel="stylesheet" href="./styles/pages.css" />
</head>
<body>
  <div class="page">
    <div data-include="./partials/navbar.html"></div>

    <main class="section">
      <div class="container">
        <div style="font-weight:900; font-size:24px">Mi perfil</div>
        <div style="color:var(--text-1); margin-top:6px">Información de cuenta y publicaciones.</div>

        <div class="grid" style="grid-template-columns: 1fr; gap:14px; margin-top:14px">
          <div class="glass card" id="profileBox">Cargando...</div>
          <div class="glass card hidden" id="myCarsBox">
            <div style="font-weight:900; margin-bottom:12px">Mis publicaciones</div>
            <div class="grid cols-3" id="myCarsGrid"></div>
          </div>
        </div>
      </div>
    </main>

    <div data-include="./partials/footer.html"></div>
  </div>

  <script src="./js/config.js"></script>
  <script type="module" src="./js/app.js"></script>
  <script type="module" src="./js/profile-page.js"></script>
</body>
</html>
