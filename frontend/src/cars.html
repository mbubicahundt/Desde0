<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Autos — LuxAuto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/layout.css" />
  <link rel="stylesheet" href="./styles/components.css" />
  <link rel="stylesheet" href="./styles/pages.css" />
</head>
<body>
  <div class="page">
    <div data-include="./partials/navbar.html"></div>

    <main class="section">
      <div class="container">
        <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap">
          <div>
            <div style="font-weight:900; font-size:24px">Buscar autos</div>
            <div style="color:var(--text-1); font-size:13px; margin-top:4px">Filtrá por marca, precio, año, km, ubicación y más.</div>
          </div>
          <div class="chip" id="resultMeta">—</div>
        </div>

        <div class="sidebar-layout" style="margin-top:16px">
          <aside class="glass card">
            <div style="font-weight:900; margin-bottom:12px">Filtros</div>

            <div style="display:grid; gap:10px">
              <div>
                <label>Marca</label>
                <input class="input" id="fBrand" placeholder="Ej: Toyota" />
              </div>
              <div>
                <label>Modelo</label>
                <input class="input" id="fModel" placeholder="Ej: Corolla" />
              </div>
              <div>
                <label>Ubicación</label>
                <input class="input" id="fLocation" placeholder="Ej: Buenos Aires" />
              </div>

              <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div>
                  <label>Precio mín.</label>
                  <input class="input" id="fPriceMin" type="number" min="0" />
                </div>
                <div>
                  <label>Precio máx.</label>
                  <input class="input" id="fPriceMax" type="number" min="0" />
                </div>
              </div>

              <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div>
                  <label>Año mín.</label>
                  <input class="input" id="fYearMin" type="number" min="1900" />
                </div>
                <div>
                  <label>Año máx.</label>
                  <input class="input" id="fYearMax" type="number" min="1900" />
                </div>
              </div>

              <div>
                <label>Kilometraje máx.</label>
                <input class="input" id="fMileageMax" type="number" min="0" />
              </div>

              <div>
                <label>Carrocería</label>
                <select id="fBodyType">
                  <option value="">Cualquiera</option>
                  <option>SEDAN</option>
                  <option>SUV</option>
                  <option>COUPE</option>
                  <option>HATCHBACK</option>
                  <option>WAGON</option>
                  <option>PICKUP</option>
                  <option>VAN</option>
                  <option>CROSSOVER</option>
                  <option>OTHER</option>
                </select>
              </div>

              <div>
                <label>Transmisión</label>
                <select id="fTransmission">
                  <option value="">Cualquiera</option>
                  <option>MANUAL</option>
                  <option>AUTOMATIC</option>
                </select>
              </div>

              <div class="split" style="margin-top:6px">
                <button class="btn primary" id="applyBtn" type="button">Aplicar</button>
                <button class="btn" id="resetBtn" type="button">Reset</button>
              </div>
            </div>
          </aside>

          <section>
            <div class="grid cols-3" id="carsGrid"></div>
            <div style="margin-top:16px; display:flex; gap:10px; justify-content:center">
              <button class="btn" type="button" id="prevBtn">Anterior</button>
              <button class="btn" type="button" id="nextBtn">Siguiente</button>
            </div>
          </section>
        </div>
      </div>
    </main>

    <div data-include="./partials/footer.html"></div>
  </div>

  <script src="./js/config.js"></script>
  <script type="module" src="./js/app.js"></script>
  <script type="module" src="./js/cars-page.js"></script>
</body>
</html>
